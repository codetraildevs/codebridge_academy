name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Supabase SQL Migration
        if: hashFiles('sql/migration-add-columns.sql') != ''
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          if [ -z "$SUPABASE_DATABASE_URL" ]; then
            echo "⚠️  SUPABASE_DATABASE_URL secret not set — skipping migration"
            exit 0
          fi
          echo "=== Installing PostgreSQL client ==="
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          echo "=== Running SQL migration ==="
          psql "$SUPABASE_DATABASE_URL" -f sql/migration-add-columns.sql
          echo "✅ Migration complete"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 159.198.36.184
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          fingerprint: ${{ secrets.VPS_HOST_KEY }}
          script: |
            set -e
            echo "=== Pulling latest changes ==="
            cd /var/www/codebridgeacademy
            git stash --include-untracked || true
            git pull origin main
            systemctl reload nginx || echo "nginx reload skipped (not running or not installed)"
            echo "=== Deploy complete ==="

      - name: Deployment Status
        run: echo "✅ Deployed main branch to VPS (159.198.36.184)"

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: |
            ${{ job.status == 'success' && '✅' || '❌' }} Deploy to VPS — CodeBridge Academy (${{ github.sha }})
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: CodeBridge CI <${{ secrets.SMTP_USERNAME }}>
          body: |
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.triggering_actor }}
            Status: ${{ job.status }}
            Workflow: ${{ github.workflow }}
            
            View run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
