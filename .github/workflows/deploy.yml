name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 159.198.36.184
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          # Optional: add your VPS host key fingerprint for extra security
          # Get it by running: ssh-keyscan -H 159.198.36.184
          # host_key: ${{ secrets.VPS_HOST_KEY }}
          script: |
            set -e

            # --- First-time setup ---
            # Run this once on the VPS before this workflow will work:
            #   git clone <repo-url> /var/www/codebridgeacademy
            # Then add your SSH deploy key to GitHub secrets as VPS_SSH_KEY

            echo "=== Pulling latest changes ==="
            cd /var/www/codebridgeacademy

            # Stash any local changes (in case the server has manual edits)
            git stash --include-untracked || true

            # Pull latest from main
            git pull origin main

            # --- Reload web server ---
            systemctl reload nginx || echo "nginx reload skipped (not running or not installed)"

            echo "=== Deploy complete ==="

      - name: Deployment Status
        run: echo "✅ Deployed main branch to VPS (159.198.36.184)"

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: |
            ${{ job.status == 'success' && '✅' || '❌' }} Deploy to VPS — CodeBridge Academy (${{ github.sha }})
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: CodeBridge CI <${{ secrets.SMTP_USERNAME }}>
          body: |
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.triggering_actor }}
            Status: ${{ job.status }}
            Workflow: ${{ github.workflow }}
            
            View run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
