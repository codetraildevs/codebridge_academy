name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start local server
        run: |
          cd /home/runner/work/codebridge_academy/codebridge_academy && python3 -m http.server 8080 &
          sleep 3
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/

      - name: Create output directory
        run: mkdir -p lighthouse-report

      - name: Run Lighthouse with budget check
        id: lighthouse
        run: |
          npm run lighthouse:budget 2>&1 || echo "LIGHTHOUSE_EXIT_CODE=$?"

      - name: Wait for report
        run: |
          echo "Checking for report files..."
          for i in $(seq 1 15); do
            FILES=$(ls lighthouse-report/*.report.json 2>/dev/null)
            if [ -n "$FILES" ]; then
              echo "✅ Report ready after ${i}s"
              echo "$FILES"
              break
            fi
            sleep 2
          done
          echo "--- lighthouse-report directory ---"
          ls -la lighthouse-report/ 2>/dev/null || echo "(empty)"

      - name: Run budget check script
        id: budget
        run: node scripts/check-budget.js

      - name: Print Performance Summary
        run: |
          REPORT=$(ls lighthouse-report/*.report.json 2>/dev/null | head -1)
          if [ -n "$REPORT" ]; then
            node -e "
              const r = require('./$REPORT');
              const cats = ['performance','accessibility','best-practices','seo'];
              console.log('=== Lighthouse Scores ===');
              cats.forEach(c => {
                const s = r.categories[c];
                if (s) console.log(c + ': ' + (s.score * 100).toFixed(0) + '/100');
              });
            "
          fi

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lighthouse-report/
          retention-days: 7

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: |
            ${{ job.status == 'success' && '✅' || '❌' }} Lighthouse CI — CodeBridge Academy (${{ github.sha }})
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: CodeBridge CI <${{ secrets.SMTP_USERNAME }}>
          body: |
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.triggering_actor }}
            Status: ${{ job.status }}
            Workflow: ${{ github.workflow }}

            View run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
