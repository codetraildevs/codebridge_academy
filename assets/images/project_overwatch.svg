<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <defs>
    <linearGradient id="gradRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <linearGradient id="gradBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="gradOrange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="glowRed">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#EF4444" flood-opacity="0.4"/>
    </filter>
    <filter id="glowBlue">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#3B82F6" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="260" rx="14" fill="#0A0F1E"/>
  <!-- Grid overlay -->
  <g opacity="0.03">
    <line x1="0" y1="40" x2="400" y2="40" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="400" y2="80" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="400" y2="120" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="400" y2="160" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="400" y2="240" stroke="#fff" stroke-width="0.5"/>
    <line x1="80" y1="0" x2="80" y2="260" stroke="#fff" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="260" stroke="#fff" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="260" stroke="#fff" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="260" stroke="#fff" stroke-width="0.5"/>
  </g>
  <!-- Top bar -->
  <rect x="0" y="0" width="400" height="40" rx="14" fill="#0D1525"/>
  <rect x="0" y="20" width="400" height="20" fill="#0D1525"/>
  <!-- Logo area -->
  <rect x="12" y="10" width="18" height="18" rx="4" fill="#DC2626"/>
  <text x="16" y="23" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="900">O</text>
  <text x="34" y="23" font-family="Courier New, monospace" font-size="10" fill="#EF4444" font-weight="800">OVERWATCH</text>
  <!-- Status indicator -->
  <circle cx="340" cy="20" r="4" fill="#EF4444" filter="url(#glowRed)">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="350" y="24" font-family="Arial, sans-serif" font-size="8" fill="#EF4444" font-weight="700">LIVE 47</text>
  <!-- Map / Threat grid -->
  <g transform="translate(12, 52)">
    <rect x="0" y="0" width="376" height="108" rx="8" fill="#111827" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <!-- Map label -->
    <text x="10" y="16" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">THREAT MAP — RWANDA</text>
    <!-- Threat markers -->
    <!-- Kigali -->
    <g transform="translate(100, 55)">
      <circle cx="0" cy="0" r="18" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
      <circle cx="0" cy="0" r="8" fill="rgba(239,68,68,0.2)" stroke="#EF4444" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="3" fill="#EF4444" filter="url(#glowRed)"/>
      <text x="0" y="-28" font-family="Arial, sans-serif" font-size="7" fill="#EF4444" text-anchor="middle" font-weight="700">KIGALI</text>
      <rect x="-10" y="22" width="20" height="14" rx="3" fill="rgba(239,68,68,0.15)"/>
      <text x="0" y="33" font-family="Arial, sans-serif" font-size="9" fill="#EF4444" text-anchor="middle" font-weight="800">12</text>
    </g>
    <!-- Musanze -->
    <g transform="translate(220, 35)">
      <circle cx="0" cy="0" r="14" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
      <circle cx="0" cy="0" r="6" fill="rgba(245,158,11,0.2)" stroke="#F59E0B" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="2.5" fill="#F59E0B"/>
      <text x="0" y="-24" font-family="Arial, sans-serif" font-size="7" fill="#F59E0B" text-anchor="middle" font-weight="700">MUSANZE</text>
      <rect x="-8" y="18" width="16" height="12" rx="3" fill="rgba(245,158,11,0.15)"/>
      <text x="0" y="27" font-family="Arial, sans-serif" font-size="8" fill="#F59E0B" text-anchor="middle" font-weight="800">5</text>
    </g>
    <!-- Rubavu -->
    <g transform="translate(310, 70)">
      <circle cx="0" cy="0" r="16" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
      <circle cx="0" cy="0" r="7" fill="rgba(239,68,68,0.2)" stroke="#EF4444" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="2.5" fill="#EF4444"/>
      <text x="0" y="-26" font-family="Arial, sans-serif" font-size="7" fill="#EF4444" text-anchor="middle" font-weight="700">RUBAVU</text>
      <rect x="-8" y="18" width="16" height="12" rx="3" fill="rgba(239,68,68,0.15)"/>
      <text x="0" y="27" font-family="Arial, sans-serif" font-size="8" fill="#EF4444" text-anchor="middle" font-weight="800">8</text>
    </g>
  </g>
  <!-- Stats row -->
  <g transform="translate(12, 170)">
    <rect x="0" y="0" width="88" height="42" rx="6" fill="#111827" stroke="rgba(59,130,246,0.12)" stroke-width="1"/>
    <text x="44" y="16" font-family="Courier New, monospace" font-size="16" fill="#60A5FA" text-anchor="middle" font-weight="800">47</text>
    <text x="44" y="32" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.35)" text-anchor="middle">THREATS</text>
    <rect x="96" y="0" width="88" height="42" rx="6" fill="#111827" stroke="rgba(239,68,68,0.12)" stroke-width="1"/>
    <text x="140" y="16" font-family="Courier New, monospace" font-size="16" fill="#EF4444" text-anchor="middle" font-weight="800">82</text>
    <text x="140" y="32" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.35)" text-anchor="middle">RISK SCORE</text>
    <rect x="192" y="0" width="88" height="42" rx="6" fill="#111827" stroke="rgba(245,158,11,0.12)" stroke-width="1"/>
    <text x="236" y="16" font-family="Courier New, monospace" font-size="16" fill="#F59E0B" text-anchor="middle" font-weight="800">3</text>
    <text x="236" y="32" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.35)" text-anchor="middle">CITIES</text>
    <rect x="288" y="0" width="88" height="42" rx="6" fill="#111827" stroke="rgba(16,185,129,0.12)" stroke-width="1"/>
    <text x="332" y="16" font-family="Courier New, monospace" font-size="16" fill="#34D399" text-anchor="middle" font-weight="800">94%</text>
    <text x="332" y="32" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.35)" text-anchor="middle">UPTIME</text>
  </g>
  <!-- Bottom alerts bar -->
  <g transform="translate(12, 220)">
    <rect x="0" y="0" width="376" height="28" rx="6" fill="#111827" stroke="rgba(239,68,68,0.08)" stroke-width="1"/>
    <circle cx="12" cy="14" r="3" fill="#EF4444">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="22" y="18" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.6)">🔴 3 active threats detected —</text>
    <text x="195" y="18" font-family="Arial, sans-serif" font-size="8" fill="#60A5FA" font-weight="700">View Incidents →</text>
  </g>
</svg>