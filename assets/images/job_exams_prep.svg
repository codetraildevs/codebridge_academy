<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="260" rx="14" fill="#0F172A"/>
  <!-- Status bar -->
  <rect x="0" y="0" width="400" height="36" rx="14" fill="#1E293B"/>
  <rect x="0" y="18" width="400" height="18" fill="#1E293B"/>
  <text x="20" y="23" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" font-weight="700">9:41</text>
  <rect x="340" y="16" width="18" height="10" rx="3" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1"/>
  <!-- Header -->
  <rect x="0" y="36" width="400" height="44" fill="#1E293B"/>
  <text x="16" y="62" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="800">📝 Mock Exam</text>
  <!-- Timer badge -->
  <rect x="280" y="46" width="100" height="22" rx="11" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="290" y="61" font-family="Arial, sans-serif" font-size="11" fill="#EF4444" font-weight="700">⏱ 12:34</text>
  <!-- Progress bar -->
  <g transform="translate(16, 86)">
    <rect x="0" y="0" width="368" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
    <rect x="0" y="0" width="110" height="6" rx="3" fill="url(#headerGrad)"/>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">Question 4 of 10</text>
    <text x="368" y="20" font-family="Arial, sans-serif" font-size="9" fill="#F59E0B" text-anchor="end" font-weight="700">40%</text>
  </g>
  <!-- Question card -->
  <g transform="translate(16, 118)">
    <rect x="0" y="0" width="368" height="38" rx="8" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.12)" stroke-width="1"/>
    <text x="12" y="16" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.4)" font-weight="600">QUESTION 4</text>
    <text x="12" y="30" font-family="Arial, sans-serif" font-size="11" fill="#E2E8F0">What is the primary function of a database index?</text>
  </g>
  <!-- Options -->
  <g transform="translate(16, 164)">
    <!-- Option A -->
    <rect x="0" y="0" width="368" height="24" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <circle cx="14" cy="12" r="7" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <text x="30" y="16" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">A. To store large amounts of data</text>
  </g>
  <g transform="translate(16, 192)">
    <!-- Option B - SELECTED (correct) -->
    <rect x="0" y="0" width="368" height="24" rx="6" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.25)" stroke-width="1.5"/>
    <circle cx="14" cy="12" r="7" fill="#10B981"/>
    <circle cx="14" cy="12" r="2.5" fill="#fff"/>
    <text x="30" y="16" font-family="Arial, sans-serif" font-size="10" fill="#6EE7B7" font-weight="600">B. To speed up data retrieval operations</text>
    <text x="355" y="16" font-family="Arial, sans-serif" font-size="11" fill="#10B981">✓</text>
  </g>
  <g transform="translate(16, 220)">
    <!-- Option C -->
    <rect x="0" y="0" width="368" height="24" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <circle cx="14" cy="12" r="7" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <text x="30" y="16" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">C. To secure the database from threats</text>
  </g>
</svg>