<svg width="520" height="165" viewBox="0 0 520 165" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CodeBridge Academy Logo">
  <defs>
    <!-- Blue gradient for left arch arm -->
    <linearGradient id="g-blue" x1="10%" y1="100%" x2="90%" y2="0%">
      <stop offset="0%" stop-color="#1535A0"/>
      <stop offset="100%" stop-color="#3D7FDB"/>
    </linearGradient>
    <!-- Orange gradient for right arch arm -->
    <linearGradient id="g-orange" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#FF9900"/>
      <stop offset="100%" stop-color="#D95C00"/>
    </linearGradient>
    <!-- Cap top gradient: blue → light blue → orange -->
    <linearGradient id="g-cap-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1A50C8"/>
      <stop offset="45%"  stop-color="#7AABF0"/>
      <stop offset="100%" stop-color="#FF9900"/>
    </linearGradient>
    <!-- Cap band gradient -->
    <linearGradient id="g-cap-band" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1535A0"/>
      <stop offset="50%"  stop-color="#5E99E8"/>
      <stop offset="100%" stop-color="#FF9900"/>
    </linearGradient>
    <!-- Shine overlay -->
    <linearGradient id="g-shine-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.30)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.00)"/>
    </linearGradient>
    <linearGradient id="g-shine-right" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.00)"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════
       LEFT ARCH ARM  (blue)
       Outer: M 12,154  → peak (112,17)
       Inner: M 52,154  → peak (116,44)
  ════════════════════════════════════ -->
  <path d="M 12,154 C 12,82 56,22 112,17
           L 116,44
           C 76,48 48,96 50,154 Z"
        fill="url(#g-blue)"/>
  <!-- Shine on left arm -->
  <path d="M 18,145 C 16,86 58,32 106,22
           L 110,30
           C 64,42 28,90 32,145 Z"
        fill="url(#g-shine-left)"/>

  <!-- ═══════════════════════════════
       RIGHT ARCH ARM  (orange)
       Outer: peak (112,17) → M 222,154
       Inner: peak (116,44) → M 184,154
  ════════════════════════════════════ -->
  <path d="M 112,17 C 168,17 210,72 222,154
           L 184,154
           C 176,84 150,44 116,44 Z"
        fill="url(#g-orange)"/>
  <!-- Shine on right arm -->
  <path d="M 116,24 C 162,26 200,76 210,148
           L 202,150
           C 190,80 156,36 120,32 Z"
        fill="url(#g-shine-right)"/>

  <!-- ═══════════════════════════════
       GRADUATION CAP
  ════════════════════════════════════ -->
  <!-- Cap band / cylinder (sits below flat top, above the arch) -->
  <path d="M 82,37 Q 114,52 148,37 L 148,50 Q 114,65 82,50 Z"
        fill="url(#g-cap-band)"/>

  <!-- Flat mortarboard top (polygon with slight perspective) -->
  <polygon points="73,31  113,13  155,31  115,49"
           fill="url(#g-cap-top)"/>
  <!-- Left face darker for 3-D feel -->
  <polygon points="73,31  113,13  115,49  82,37"
           fill="rgba(0,0,40,0.12)"/>
  <!-- Highlight sliver on left of cap top -->
  <polygon points="73,31  88,21  90,39  82,37"
           fill="rgba(255,255,255,0.22)"/>

  <!-- Tassel string -->
  <path d="M 153,29 C 163,36 160,52 156,62"
        stroke="#FF9900" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Tassel knot/square -->
  <rect x="150" y="62" width="12" height="9" rx="2" fill="#E07000"/>
  <!-- Tassel strands -->
  <line x1="152" y1="71" x2="150" y2="80" stroke="#FF9900" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="156" y1="71" x2="156" y2="82" stroke="#FFB040" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="160" y1="71" x2="162" y2="80" stroke="#FF9900" stroke-width="1.8" stroke-linecap="round"/>

  <!-- ═══════════════════════════════
       CODE SYMBOL   </>
  ════════════════════════════════════ -->
  <text x="117" y="124"
        font-family="'Arial Black', Arial, sans-serif"
        font-weight="900"
        font-size="30"
        fill="#1B2A6B"
        text-anchor="middle">&lt;/&gt;</text>

  <!-- ═══════════════════════════════
       TEXT  — right section
  ════════════════════════════════════ -->
  <!-- CODEBRIDGE -->
  <text x="247" y="72"
        font-family="'Arial Black', Impact, Arial, sans-serif"
        font-weight="900"
        font-size="46"
        fill="#1B2A6B"
        letter-spacing="0.5">CODEBRIDGE</text>

  <!-- ACADEMY -->
  <text x="252" y="101"
        font-family="Arial, sans-serif"
        font-weight="700"
        font-size="22"
        fill="#1B2A6B"
        letter-spacing="10">ACADEMY</text>

  <!-- Tagline line 1 -->
  <text x="253" y="122"
        font-family="Arial, sans-serif"
        font-weight="400"
        font-size="11.5"
        fill="#3A4A6B"
        letter-spacing="2.8">BRIDGING LEARNING TO</text>

  <!-- Tagline line 2 -->
  <text x="253" y="138"
        font-family="Arial, sans-serif"
        font-weight="400"
        font-size="11.5"
        fill="#3A4A6B"
        letter-spacing="2.8">REAL SOFTWARE CAREERS</text>
</svg>